<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出货账单管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>出货账单管理</h1>
      <div class="status" id="status">连接中...</div>
    </header>

    <div class="summary">
      <div class="card">
        <div class="label">总出货量</div>
        <div class="value" id="statQty">0</div>
      </div>
      <div class="card">
        <div class="label">总货款</div>
        <div class="value" id="statTotal">¥0.00</div>
      </div>
      <div class="card">
        <div class="label">已结款</div>
        <div class="value" id="statPaid">¥0.00</div>
      </div>
      <div class="card highlight">
        <div class="label">未结款</div>
        <div class="value" id="statUnpaid">¥0.00</div>
      </div>
      <div class="card">
        <div class="label">未结笔数</div>
        <div class="value" id="statUnpaidCount">0</div>
      </div>
    </div>

    <div class="form-section">
      <h2 id="formTitle">添加账单</h2>
      <form id="billForm" class="form-grid">
        <div class="field">
          <label>日期</label>
          <input type="date" id="date" required>
        </div>
        <div class="field">
          <label>客户公司</label>
          <input type="text" id="company" placeholder="输入公司名称" required>
        </div>
        <div class="field">
          <label>出货量</label>
          <input type="number" id="quantity" placeholder="数量" step="0.01" min="0" required>
        </div>
        <div class="field">
          <label>单价</label>
          <input type="number" id="unitPrice" placeholder="单价" step="0.01" min="0" required>
        </div>
        <div class="field">
          <label>已结款</label>
          <input type="number" id="paid" placeholder="已收金额" step="0.01" min="0" value="0">
        </div>
        <div class="field">
          <label>备注</label>
          <input type="text" id="note" placeholder="可选">
        </div>
        <div class="field full">
          <label>自动计算：总价 <span id="previewTotal">¥0.00</span>，未结款 <span id="previewUnpaid" class="unpaid-text">¥0.00</span></label>
        </div>
        <div class="field actions">
          <button type="submit" id="submitBtn">添加</button>
          <button type="button" id="cancelBtn" class="secondary">取消</button>
        </div>
      </form>
    </div>

    <div class="filter-section">
      <div class="filter-group">
        <label>月份</label>
        <input type="month" id="filterMonth">
      </div>
      <div class="filter-group">
        <label>公司</label>
        <select id="filterCompany">
          <option value="">全部公司</option>
        </select>
      </div>
      <div class="filter-group checkbox">
        <input type="checkbox" id="filterUnpaid">
        <label for="filterUnpaid">仅看未结款</label>
      </div>
      <div class="filter-group">
        <button id="resetFilter">重置筛选</button>
      </div>
      <div class="filter-group export-group">
        <button id="exportBtn">导出 JSON</button>
        <label class="file-btn">
          导入 JSON
          <input type="file" id="importBtn" accept=".json" hidden>
        </label>
      </div>
    </div>

    <div class="table-section">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>公司</th>
            <th>出货量</th>
            <th>单价</th>
            <th>总价</th>
            <th>已结款</th>
            <th>未结款</th>
            <th>备注</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="billTableBody"></tbody>
      </table>
      <div id="emptyTip" class="empty" style="display:none;">暂无记录</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
